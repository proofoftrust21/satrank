# Phase 12B — Postgres 16 tuning for cpx42 (8 vCPU / 16 GB RAM / local SSD)
# Baseline : pgtune "web" profile with manual adjustments for SatRank workload
# (mostly short transactions + one-shot heavy scans on scoring recalc).

listen_addresses = '*'
port = 5432

# ---- Connections
max_connections = 200

# ---- Memory
shared_buffers = 4GB                    # 25 % of RAM
effective_cache_size = 12GB             # 75 % of RAM
work_mem = 64MB                         # per-sort/hash op; conservative given max_connections
maintenance_work_mem = 1GB              # for VACUUM, CREATE INDEX, etc.
wal_buffers = 16MB

# ---- Disk / SSD
random_page_cost = 1.1                  # local SSD
effective_io_concurrency = 200
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB

# ---- Parallelism (8 vCPU)
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ---- Timeouts (per B0 validation — queries > 10s trigger rollback)
statement_timeout = 15s                 # hard kill for API queries
lock_timeout = 5s                       # avoid deadlock chains
idle_in_transaction_session_timeout = 60s

# ---- Logging (observability baseline)
log_destination = 'stderr'
logging_collector = off                 # let docker capture stderr
log_min_duration_statement = 500ms      # log slow queries
log_checkpoints = on
log_connections = off                   # chatty — enable only during debugging
log_disconnections = off
log_line_prefix = '%t [%p] %u@%d '
log_temp_files = 0                      # log every temp file use

# ---- pg_stat_statements
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ---- Autovacuum (SatRank workload: many small writes from crawler)
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
