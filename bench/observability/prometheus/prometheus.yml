# Phase 12A Prometheus scrape config
# Scrapes:
#   - itself (prometheus)
#   - staging node-exporter (host) + cadvisor (containers)
#   - staging SatRank API /metrics (direct, localhost auth bypass via host-gateway)
#   - prod SatRank API /metrics via SSH tunnel on localhost:18080
#     (see systemd/satrank-prod-tunnel.service — maintained on the staging VM)
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: phase-12a

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter-staging
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          env: staging

  - job_name: cadvisor-staging
    static_configs:
      - targets: ['cadv12a:8080']
        labels:
          env: staging

  - job_name: satrank-api-staging
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          env: staging
          component: api

  - job_name: satrank-api-prod
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:18080']
        labels:
          env: prod
          component: api
    # Tunnel on staging VM: localhost:18080 → prod:127.0.0.1:8080
    # Prod's /metrics bypasses auth for localhost, so no API key needed.
    # Tunnel is systemd-managed (see systemd/satrank-prod-tunnel.service).

  - job_name: loki-self
    static_configs:
      - targets: ['loki12a:3100']
