# Phase 12B B2 — Postgres 16 on satrank-postgres (cpx42)
# Tuning targets: 8 vCPU / 16 GB RAM / local SSD
# Pools (per B0 validation): API max=30, crawler max=20 → total steady ≤ 50, with headroom to 200
services:
  postgres:
    image: postgres:16
    container_name: satrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: satrank
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: satrank
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init:/docker-entrypoint-initdb.d:ro
    secrets:
      - pg_password
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    ports:
      # bind to all interfaces; UFW gates access to prod IP + localhost
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satrank -d satrank"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  pgdata:
    driver: local

secrets:
  pg_password:
    file: ./secrets/pg_password
