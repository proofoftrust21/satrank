services:
  api:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: satrank-api
    restart: unless-stopped
    ports:
      # Bind to loopback only — the public path is Internet → nginx → Express
      # on 127.0.0.1:3000. Binding to 0.0.0.0 is a defense-in-depth failure:
      # if the host firewall or cloud firewall ever drops its rules, port
      # 3000 would be reachable directly and bypass nginx rate limits and
      # the Aperture L402 gate.
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - BUILD_DATE=${BUILD_DATE:-unknown}
    volumes:
      - satrank-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.json()).then(j=>{process.exit(j.data.status==='ok'?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      # 120s covers the cache warmup cold-start on a 5.8 GB DB (~75s observed).
      # The warmup runs synchronously before listen() so health only becomes
      # queryable once stats cache is populated.
      start_period: 120s
      retries: 3
    stop_grace_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          # 1024M to cover memoryCache + warmup peak (observed ~200 MB steady,
          # ~450 MB peak during cold stats rebuild). Prior 512M caused OOM kills.
          memory: 1024M

  crawler:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: satrank-crawler
    restart: unless-stopped
    entrypoint: ["node", "--experimental-require-module", "dist/crawler/run.js", "--cron"]
    ports:
      # Crawler /metrics on loopback — same host-binding model as the api (3000).
      # Prometheus scrapes via localhost:9091. External access requires
      # X-API-Key; loopback (SSH tunnel / sidecar) is unauthenticated.
      - "127.0.0.1:${CRAWLER_METRICS_PORT:-9091}:9091"
    env_file:
      - .env.production
    environment:
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - BUILD_DATE=${BUILD_DATE:-unknown}
    volumes:
      - satrank-data:/app/data
      # Bind mount of the LND readonly macaroon. Resolved relative to the
      # docker-compose.yml directory, so the path on the host is wherever
      # you deploy (no hardcoded server path in the public repo).
      - ./readonly.macaroon:/app/data/readonly.macaroon:ro
    depends_on:
      api:
        condition: service_healthy
    # Liveness via heartbeat file touched by src/crawler/run.ts every 60s.
    # Threshold 300s = 5× heartbeat interval — tolerates synchronous bursts
    # (bulk scoring, stale sweep) without false positives while still
    # catching a real event-loop stall within a few minutes.
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /tmp/crawler.heartbeat 2>/dev/null || echo 0))) -lt 300"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          # 1024M: the LND graph crawl parses the entire public graph JSON
          # (~80k nodes / 600k channels as of 2026-04) in a single response.
          # 512M OOM-killed the container mid-parse. Matches the api's cap.
          memory: 1024M

volumes:
  satrank-data:
    driver: local
