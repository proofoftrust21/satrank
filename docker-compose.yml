services:
  api:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: satrank-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - BUILD_DATE=${BUILD_DATE:-unknown}
    volumes:
      - satrank-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.json()).then(j=>{process.exit(j.data.status==='ok'?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 30s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  crawler:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: satrank-crawler
    restart: unless-stopped
    entrypoint: ["node", "--experimental-require-module", "dist/crawler/run.js", "--cron"]
    env_file:
      - .env.production
    environment:
      - GIT_COMMIT=${GIT_COMMIT:-dev}
      - BUILD_DATE=${BUILD_DATE:-unknown}
    volumes:
      - satrank-data:/app/data
      - /root/satrank/readonly.macaroon:/app/data/readonly.macaroon:ro
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  satrank-data:
    driver: local
