# Promtail config — staging side
# Tails Docker container JSON logs + host syslog, pushes to local Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki12a:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: staging
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: log

  - job_name: syslog-staging
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: staging
          __path__: /var/log/syslog
