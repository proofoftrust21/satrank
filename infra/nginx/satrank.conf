# SatRank nginx config (L402 native gate)
#
# Public path: Internet -> nginx (443) -> Express (127.0.0.1:3000)
#
# Le gate L402 est natif Express (middleware src/middleware/l402Native.ts) :
#   - 402 challenge + macaroon HMAC + BOLT11 si pas d'Authorization
#   - Passe-plat si Authorization: L402 deposit:* (balance credits)
#   - Verify macaroon + preimage + first-use settled sinon
#   - X-Operator-Token match OPERATOR_BYPASS_SECRET -> passe-plat ops
#
# Deploy: ce fichier est la source of truth. Pour appliquer :
#
#     sudo cp infra/nginx/satrank.conf /etc/nginx/sites-enabled/satrank
#     sudo nginx -t && sudo systemctl reload nginx
#
# Drift policy : tout edit prod qui diverge de ce fichier est un drift. Le
# prochain deploy depuis le repo silently revert. Voir docs/DEPLOY.md.

server {
    listen 80;
    server_name satrank.dev api.satrank.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name satrank.dev api.satrank.dev;

    ssl_certificate /etc/letsencrypt/live/satrank.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/satrank.dev/privkey.pem;

    # Audit M7-M8: explicit TLS + body-size hardening.
    # TLS 1.0/1.1 disabled, legacy ciphers disabled, server-chosen order.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Biggest legit body: /api/verdicts 100-target batch ~= 7KB. /api/watchlist 50 hashes ~= 3.2KB.
    # Express caps at 10KB via express.json(). nginx cap at 16KB = 2x headroom.
    client_max_body_size 16k;
    client_body_buffer_size 16k;

    # Paid endpoints — direct to Express (L402 native gate handles L402 flow +
    # deposit bypass + operator bypass).
    location ~ ^/api/agent/[a-f0-9]+ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Phase 10 sunset — /api/decide and /api/best-route return 410 Gone from
    # Express (src/controllers/legacyGoneController.ts). Keep explicit locations
    # so any future regex change to /api/agent/* does not accidentally shadow
    # them.
    location = /api/best-route {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/decide {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/profile/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/verdicts {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Free endpoints — direct to Express
    location = /api/report {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/nostr.json {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~* \.(png|jpg|jpeg|ico|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    location /.well-known/402index-verify.txt {
        alias /tmp/satrank-verify/402index-verify.txt;
        add_header Content-Type text/plain;
    }

    # Everything else — direct to Express (free)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
