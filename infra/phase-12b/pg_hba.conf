# Phase 12B — Postgres host-based auth
# UFW is the outer perimeter (port 5432 gated to prod IP + localhost)
# pg_hba is the inner perimeter (require scram-sha-256 for everything remote)

# TYPE  DATABASE  USER     ADDRESS         METHOD
local   all       all                      trust
host    all       all      127.0.0.1/32    scram-sha-256
host    all       all      ::1/128         scram-sha-256
# Docker bridge networks (for local containers like SatRank api in dev/staging)
host    all       all      172.16.0.0/12   scram-sha-256
# Prod SatRank API origin (Phase 12B cut-over target)
host    all       all      178.104.108.108/32  scram-sha-256
# IPv6 of satrank-postgres itself (for local docker-to-docker on same VM if needed)
host    all       all      ::/0            scram-sha-256
