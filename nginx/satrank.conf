# SatRank nginx reverse proxy configuration
# Install: ln -s /opt/satrank/nginx/satrank.conf /etc/nginx/sites-enabled/satrank.conf
# Reload:  nginx -t && systemctl reload nginx

upstream satrank {
    server 127.0.0.1:3000;
    keepalive 8;
}

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=satrank_api:10m rate=30r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name satrank.io;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name satrank.io;

    # SSL — managed by certbot (adjust paths to your setup)
    ssl_certificate     /etc/letsencrypt/live/satrank.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/satrank.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/html text/css application/javascript;
    gzip_min_length 256;

    # Static assets (landing page) — served by Express but cached here
    location / {
        proxy_pass http://satrank;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        location ~* \.(html|css|js|ico|png|jpg|svg)$ {
            proxy_pass http://satrank;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # API endpoints — rate limited, retry on 502 during deploys
    location /api/ {
        limit_req zone=satrank_api burst=20 nodelay;

        proxy_pass http://satrank;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Zero-downtime: retry next upstream on 502 during container restart
        proxy_next_upstream error timeout http_502;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 3;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Block common attack paths
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/satrank.access.log;
    error_log  /var/log/nginx/satrank.error.log;
}
