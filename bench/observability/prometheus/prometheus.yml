# Phase 12A Prometheus scrape config
# Scrapes (staging-local only):
#   - itself (prometheus)
#   - staging node-exporter (host) + cadvisor (containers)
#   - staging SatRank API /metrics (direct, localhost auth bypass via host-gateway)
#
# Prod is observed via nginx access logs pushed by ptail-prod into Loki —
# not scraped as Prometheus targets. This avoids a persistent SSH tunnel
# to prod and keeps Phase 12A strictly within its authorized read-only
# prod surface (promtail + A6 smoke test).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: phase-12a

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter-staging
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          env: staging

  - job_name: cadvisor-staging
    static_configs:
      - targets: ['cadv12a:8080']
        labels:
          env: staging

  - job_name: satrank-api-staging
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          env: staging
          component: api

  - job_name: loki-self
    static_configs:
      - targets: ['loki12a:3100']
