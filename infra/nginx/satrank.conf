# nginx config for satrank.dev / api.satrank.dev
#
# Public path: Internet → nginx (443) → (Aperture L402 gate :8082 | Express :3000)
#
# Route selection per path:
#   - Paid endpoints  → $paid_backend map (Aperture by default, Express for
#                       operator or deposit tokens).
#   - Free endpoints  → Express direct.
#   - /api/decide, /api/best-route → **Phase 10 SUNSET** — routed direct to
#     Express so the 410 Gone handler (src/controllers/legacyGoneController.ts)
#     is reached instead of being intercepted by Aperture's 402 L402 gate.
#     Without this bypass, callers of the retired endpoints would see
#     `402 Payment Required` (forever) instead of `410 Gone` with the
#     migration pointer toward /api/intent.
#
# Deploy: this file is the source of truth. To apply:
#
#     sudo cp infra/nginx/satrank.conf /etc/nginx/sites-enabled/satrank
#     sudo nginx -t && sudo systemctl reload nginx
#
# Any prod edit that diverges from this file is a drift — fold the change
# back here and commit before the next redeploy, or the next nginx redeploy
# from this repo will silently revert it. See docs/DEPLOY.md.

# Operator bypass: if X-Aperture-Token header is present, route paid
# endpoints directly to Express (port 3000) instead of through Aperture
# (port 8082). Express validates the token via safeEqual. This enables:
#   - Operator testing without L402 payment
#   - Internal service access to paid data
#   - CI/CD health checks on paid endpoints
# Normal agents (no token) go through Aperture for standard L402 flow.
# Route paid endpoints: Aperture (L402) by default,
# direct to Express for operator tokens or deposit tokens.
map $http_x_aperture_token $has_operator_token {
    ""      0;
    default 1;
}

map $http_authorization $has_deposit_token {
    "~*^L402 deposit:" 1;
    default 0;
}

map "$has_operator_token$has_deposit_token" $paid_backend {
    "~1"    http://127.0.0.1:3000;
    default https://127.0.0.1:8082;
}

server {
    listen 80;
    server_name satrank.dev api.satrank.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name satrank.dev api.satrank.dev;

    ssl_certificate /etc/letsencrypt/live/satrank.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/satrank.dev/privkey.pem;

    # Audit M7-M8: explicit TLS + body-size hardening.
    # TLS 1.0/1.1 disabled, legacy ciphers disabled, server-chosen order.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Biggest legit body: /api/verdicts 100-target batch ~= 7KB. /api/watchlist 50 hashes ~= 3.2KB.
    # Express caps at 10KB via express.json(). nginx cap at 16KB = 2x headroom.
    client_max_body_size 16k;
    client_body_buffer_size 16k;

    # Paid endpoints — through Aperture (L402) or direct to Express (operator token)
    location ~ ^/api/agent/[a-f0-9]+ {
        proxy_pass $paid_backend;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Phase 10 sunset — routes /api/decide and /api/best-route must bypass
    # Aperture so Express returns 410 Gone (migration hint toward /api/intent)
    # instead of Aperture's 402 Payment Required. Do NOT switch to
    # $paid_backend here — the 410 handler is gone forever, no payment can
    # ever unlock them. See src/controllers/legacyGoneController.ts.
    location = /api/best-route {
        proxy_pass http://127.0.0.1:3000;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/decide {
        proxy_pass http://127.0.0.1:3000;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/profile/ {
        proxy_pass $paid_backend;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/verdicts {
        proxy_pass $paid_backend;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Free endpoints — direct to Express
    location = /api/report {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/nostr.json {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
    }

    location ~* \.(png|jpg|jpeg|ico|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    location /.well-known/402index-verify.txt {
        alias /tmp/satrank-verify/402index-verify.txt;
        add_header Content-Type text/plain;
    }

    # Everything else — direct to Express (free)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
